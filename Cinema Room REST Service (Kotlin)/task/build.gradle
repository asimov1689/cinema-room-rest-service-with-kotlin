import org.jetbrains.kotlin.gradle.tasks.KotlinCompile

buildscript {
    repositories {
        mavenCentral()
    }
    dependencies {
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$hs.kotlin.version"
        classpath "org.springframework.boot:spring-boot-gradle-plugin:3.3.0"
        classpath "io.spring.gradle:dependency-management-plugin:$hs.spring.dependencyManagementVersion"
        classpath "org.jetbrains.kotlin:kotlin-allopen:$hs.kotlin.version"
        classpath "org.jetbrains.kotlin:kotlin-noarg:$hs.kotlin.version"
    }
}

apply plugin: 'java'
apply plugin: 'kotlin'
apply plugin: 'org.springframework.boot'
apply plugin: 'io.spring.dependency-management'
apply plugin: "kotlin-spring"
apply plugin: "kotlin-jpa"

springBoot {
    mainClass = 'cinema.ApplicationKt'
}

repositories {
    mavenCentral()
}

sourceSets {
    main {
        // Prevent Kotlin files from being picked up twice (once via Java srcDirs, once via Kotlin srcDirs).
        java.setSrcDirs([])
        kotlin.setSrcDirs(["src"])
        resources.setSrcDirs(["src/resources"])
    }
    test {
        // This project’s tests are Kotlin-only and live under `test/`.
        java.setSrcDirs([])
        kotlin.setSrcDirs(["test"])
    }
}

dependencies {
    testImplementation sourceSets.main.output
    testImplementation 'org.junit.jupiter:junit-jupiter:5.9.2'
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.jetbrains.kotlin:kotlin-test'
    implementation 'org.springframework.boot:spring-boot-starter'
    implementation 'org.springframework.boot:spring-boot-starter-actuator'
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'com.fasterxml.jackson.module:jackson-module-kotlin'
    implementation 'org.jetbrains.kotlin:kotlin-reflect'
}

tasks.withType(KotlinCompile) {
    kotlinOptions {
        freeCompilerArgs = ['-Xjsr305=strict']
        jvmTarget = "23"
    }
}

tasks.withType(JavaCompile) {
    sourceCompatibility = '23'
    targetCompatibility = '23'
}

java {
    toolchain {
        languageVersion.set(JavaLanguageVersion.of(23))
    }
}

test {
    jvmArgs '--add-opens', 'java.base/java.lang=ALL-UNNAMED',
            '-XX:+EnableDynamicAgentLoading',
            '-Xshare:off'
    useJUnitPlatform()
}
